name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: visa-photo-macos-arm64
            features: "--features rembg"
          - target: x86_64-apple-darwin
            os: macos-latest
            name: visa-photo-macos-x64
            features: "--no-default-features"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: visa-photo-linux-x64
            features: "--no-default-features"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: visa-photo-windows-x64
            features: "--no-default-features"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Build Vision tool
        if: runner.os == 'macOS'
        run: |
          swiftc -O -o tools/rembg-vision tools/rembg-vision.swift \
            -framework Vision -framework AppKit -framework CoreImage

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/visa-photo dist/
          cp presets.toml models.toml dist/
          cp models/download.sh dist/
          cp -r tools dist/ 2>/dev/null || true
          cd dist && tar czf ../${{ matrix.name }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target/${{ matrix.target }}/release/visa-photo.exe dist/
          Copy-Item presets.toml, models.toml dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          generate_release_notes: true
