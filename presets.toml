# Visa Photo Presets
# face_height_percent = head height (crown to chin) as % of photo height
# face_top_margin_percent = gap from top edge to crown as %
# eye_line_from_bottom_percent = eye line from bottom edge as %
# Sources: ICAO 9303, snap2pass (MIT), government specs

# ── Turkey ──
[turkey]
name = "Turkey (ikamet)"
digital_width = 600
digital_height = 720
max_file_size_kb = 300
print_width_mm = 50
print_height_mm = 60
face_height_percent = 56.7
face_top_margin_percent = 16.7
eye_line_from_bottom_percent = 60.0
background = "white"
photo_count = 4
format = "jpeg"
notes = "White bg, no headwear, max 120 days old"

